name = "status-page"
main = "src/worker.js"
compatibility_date = "2024-12-05"

[[kv_namespaces]]
binding = "STATUS_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_NAMESPACE_PREVIEW_ID"

[vars]
# AUTH_TOKEN is a secret – set it with: wrangler secret put AUTH_TOKEN

# Uncomment to set a custom page title:
# PAGE_TITLE = "My Status"
