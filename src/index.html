<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{TITLE}}</title>
        <meta
            name="description"
            content="My current status – {{STATUS_LABEL}}"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0d0d0d;
                --text: #f0f0f0;
                --muted: #888;
                --accent: #6ee7b7;
            }

            body.light {
                --bg: #f5f5f5;
                --text: #111;
                --muted: #666;
                --accent: #059669;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-between;
                padding: 2rem;
                text-align: center;
                transition:
                    background 0.2s,
                    color 0.2s;
            }

            .content {
                max-width: 480px;
                width: 100%;
                animation: fadeIn 0.4s ease;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .page-title {
                font-size: 0.85rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 2rem;
            }

            .status-icon {
                font-size: 5rem;
                line-height: 1;
                margin-bottom: 1rem;
                display: block;
            }

            .status-label {
                font-size: clamp(2.5rem, 10vw, 5rem);
                font-weight: 700;
                line-height: 1.2;
                margin-bottom: 0.75rem;
            }

            .status-message {
                font-size: 1.15rem;
                color: var(--muted);
                margin-bottom: 1.5rem;
            }

            .updated {
                font-size: 0.78rem;
                color: var(--muted);
                opacity: 0.7;
            }

            .dot {
                display: inline-block;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--accent);
                margin-right: 0.4rem;
                animation: pulse 2s infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            footer {
                margin-top: 2.5rem;
                font-size: 0.75rem;
                color: var(--muted);
                display: flex;
                align-items: baseline;
                gap: 4px;
            }

            footer a {
                color: var(--muted);
                text-decoration: none;
            }

            footer a:hover {
                text-decoration: underline;
            }

            #theme-toggle {
                background: none;
                border: none;
                cursor: pointer;
                font-size: 0.75rem;
                color: var(--muted);
                padding: 0;
                line-height: 1;
            }

            @media (max-width: 480px) {
                .status-label {
                    font-size: 1.9rem;
                }
                .status-icon {
                    font-size: 4rem;
                }

                body {
                    justify-content: center;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <p class="page-title"><span class="dot"></span>{{TITLE}}</p>
        </header>
        <main>
            <div class="content">
                <span
                    class="status-icon"
                    role="img"
                    aria-label="{{STATUS_ARIA_LABEL}}"
                    >{{STATUS_ICON}}</span
                >
                <h1 class="status-label">{{STATUS_LABEL}}</h1>
                {{STATUS_MESSAGE_HTML}} {{UPDATED_AT_HTML}}
            </div>
        </main>
        <footer>
            <a
                href="https://github.com/4msar/status"
                target="_blank"
                rel="noopener noreferrer"
                >msar.me</a
            >
            <span>|</span>
            <button
                id="theme-toggle"
                aria-label="Toggle theme"
                title="Toggle dark/light theme"
            >
                🌙
            </button>
        </footer>

        <script>
            // Pretty-print the "last updated" timestamp in the visitor's local timezone
            const el = document.getElementById("updated-time");
            if (el) {
                const d = new Date(el.getAttribute("datetime"));
                el.textContent = d.toLocaleString(undefined, {
                    dateStyle: "medium",
                    timeStyle: "short",
                });
            }

            // Dark/light theme toggle
            const btn = document.getElementById("theme-toggle");
            const stored = localStorage.getItem("theme");
            const prefersDark = stored
                ? stored === "dark"
                : window.matchMedia("(prefers-color-scheme: dark)").matches;
            let isDark = prefersDark;
            function applyTheme() {
                document.body.classList.toggle("light", !isDark);
                btn.textContent = isDark ? "🌙" : "☀️";
                localStorage.setItem("theme", isDark ? "dark" : "light");
            }
            applyTheme();
            btn.addEventListener("click", () => {
                isDark = !isDark;
                applyTheme();
            });
        </script>
    </body>
</html>
